<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频搬运工作流 v2</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-bar">
        <div class="top-left">
            <h1>🎬 短视频搬运工作流</h1>
            <span class="version">v2.0</span>
        </div>
        <div class="top-right">
            <span class="status-dot" id="global-status"></span>
            <span id="global-status-text">就绪</span>
        </div>
    </header>

    <!-- 4列工作流 -->
    <main class="workflow">
        <!-- 第1列: 文案提取 + 文案改写 -->
        <div class="workflow-col">
            <div class="step-card" id="step-extract">
                <div class="step-header">
                    <span class="step-num">1</span>
                    <span class="step-title">提取文案素材</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <input type="text" id="extract-url" placeholder="粘贴抖音/视频号链接..." />
                        <select id="extract-platform">
                            <option value="douyin">抖音</option>
                            <option value="wechat_video">视频号</option>
                        </select>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runExtract()">提取文案</button>
                        <button class="btn-secondary" onclick="exportDraft('extract')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('extract')">⚙️</button>
                    </div>
                    <div class="step-output" id="extract-output">
                        <div class="output-meta" id="extract-meta"></div>
                        <textarea class="output-text" id="extract-text" readonly placeholder="提取结果将显示在这里..."></textarea>
                        <div class="output-stats" id="extract-stats"></div>
                    </div>
                </div>
            </div>

            <div class="step-card" id="step-rewrite">
                <div class="step-header">
                    <span class="step-num">2</span>
                    <span class="step-title">文案智能改写</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <textarea class="input-textarea" id="rewrite-input" placeholder="改写需求，例如：面向专业用户，用通俗句子表达"></textarea>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runRewrite()">改写文案</button>
                        <button class="btn-secondary" onclick="exportDraft('rewrite')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('rewrite')">⚙️</button>
                    </div>
                    <div class="step-output" id="rewrite-output">
                        <textarea class="output-text" id="rewrite-text" readonly placeholder="改写结果将显示在这里..."></textarea>
                        <div class="output-stats" id="rewrite-stats"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第2列: 语音配音 + 视频生成 -->
        <div class="workflow-col">
            <div class="step-card" id="step-tts">
                <div class="step-header">
                    <span class="step-num">3</span>
                    <span class="step-title">语音配音合成</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label class="input-label">音色选择</label>
                        <select id="tts-voice">
                            <option value="">加载中...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">语速调节 <span id="tts-rate-val">+0%</span></label>
                        <input type="range" id="tts-rate" min="-50" max="100" value="0" step="5"
                               oninput="document.getElementById('tts-rate-val').textContent=(this.value>=0?'+':'')+this.value+'%'">
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runTTS()">语音生成</button>
                        <button class="btn-secondary" onclick="exportDraft('tts')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('tts')">⚙️</button>
                    </div>
                    <div class="step-output" id="tts-output">
                        <audio id="tts-audio" controls style="display:none; width:100%"></audio>
                        <div class="output-stats" id="tts-stats"></div>
                    </div>
                </div>
            </div>

            <div class="step-card" id="step-video">
                <div class="step-header">
                    <span class="step-num">4</span>
                    <span class="step-title">视频素材生成</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label class="input-label">换脸图片（可选）</label>
                        <div class="upload-area" id="face-upload">
                            <input type="file" id="face-file" accept="image/*" hidden>
                            <p id="face-text">📸 点击上传换脸图片</p>
                            <img id="face-preview" style="display:none; max-height:60px; border-radius:6px;">
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runVideo()">视频生成</button>
                        <button class="btn-secondary" onclick="exportDraft('video')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('video')">⚙️</button>
                    </div>
                    <div class="step-output" id="video-output">
                        <video id="video-preview" controls style="display:none; width:100%; border-radius:8px;"></video>
                        <div class="output-stats" id="video-stats"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第3列: 字幕识别 + 封面设计 -->
        <div class="workflow-col">
            <div class="step-card" id="step-subtitle">
                <div class="step-header">
                    <span class="step-num">5</span>
                    <span class="step-title">字幕识别</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label class="input-label">字幕样式</label>
                        <div class="style-row">
                            <select id="sub-font">
                                <option value="Source Han Sans SC">思源黑体</option>
                                <option value="Noto Sans CJK SC">Noto黑体</option>
                                <option value="SimHei">黑体</option>
                                <option value="SimSun">宋体</option>
                            </select>
                            <input type="number" id="sub-size" value="10" min="6" max="24" style="width:60px">
                            <span class="unit">px</span>
                        </div>
                        <div class="style-row">
                            <label class="input-label-sm">字色</label>
                            <input type="color" id="sub-color" value="#000000">
                            <label class="input-label-sm">边距</label>
                            <input type="number" id="sub-margin" value="0.04" min="0" max="0.2" step="0.01" style="width:60px">
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runSubtitle()">字幕识别</button>
                        <button class="btn-secondary" onclick="exportDraft('subtitle')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('subtitle')">⚙️</button>
                    </div>
                    <div class="step-output" id="subtitle-output">
                        <div class="subtitle-timeline" id="subtitle-timeline"></div>
                        <div class="output-stats" id="subtitle-stats"></div>
                    </div>
                </div>
            </div>

            <div class="step-card" id="step-cover">
                <div class="step-header">
                    <span class="step-num">6</span>
                    <span class="step-title">封面设计</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label class="input-label">画面比例</label>
                        <select id="cover-ratio">
                            <option value="9:16">9:16（竖屏）</option>
                            <option value="16:9">16:9（横屏）</option>
                            <option value="1:1">1:1（方形）</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">封面标题</label>
                        <input type="text" id="cover-title" placeholder="输入封面标题文字...">
                    </div>
                    <div class="input-group">
                        <div class="style-row">
                            <label class="input-label-sm">字号</label>
                            <input type="range" id="cover-fontsize" min="16" max="64" value="32"
                                   oninput="document.getElementById('cover-fs-val').textContent=this.value+'px'">
                            <span id="cover-fs-val" class="unit">32px</span>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="runCover()">生成封面</button>
                        <button class="btn-secondary" onclick="exportDraft('cover')">导出中稿</button>
                        <button class="btn-icon" onclick="showModelConfig('cover')">⚙️</button>
                    </div>
                    <div class="step-output" id="cover-output">
                        <img id="cover-preview" style="display:none; width:100%; border-radius:8px;">
                        <div class="output-stats" id="cover-stats"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第4列: 导出 -->
        <div class="workflow-col">
            <div class="step-card" id="step-export">
                <div class="step-header">
                    <span class="step-num">7</span>
                    <span class="step-title">导出</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="export-burn-sub"> 烧录字幕到视频
                        </label>
                    </div>
                    <div class="export-summary" id="export-summary">
                        <div class="summary-item">
                            <span class="summary-label">文案</span>
                            <span class="summary-value" id="sum-text">-</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">配音</span>
                            <span class="summary-value" id="sum-audio">-</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">视频</span>
                            <span class="summary-value" id="sum-video">-</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">字幕</span>
                            <span class="summary-value" id="sum-subtitle">-</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">封面</span>
                            <span class="summary-value" id="sum-cover">-</span>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn-action btn-export" onclick="runExport()">🚀 一键导出</button>
                    </div>
                    <div class="step-output" id="export-output">
                        <div class="export-progress" id="export-progress" style="display:none">
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="export-bar" style="width:0%">0%</div>
                            </div>
                            <p class="status-msg" id="export-status"></p>
                        </div>
                        <div id="export-result" style="display:none">
                            <video id="export-video" controls style="width:100%; border-radius:8px;"></video>
                            <a id="export-download" class="btn-download" download>⬇️ 下载视频</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 流程概览（旧版一键模式入口） -->
            <div class="step-card mini-card">
                <div class="step-header">
                    <span class="step-title">🔄 一键模式</span>
                </div>
                <div class="step-body">
                    <p class="mini-desc">输入链接，全自动走完所有步骤</p>
                    <div class="input-group">
                        <input type="text" id="auto-url" placeholder="粘贴视频链接...">
                    </div>
                    <div class="btn-row">
                        <button class="btn-action" onclick="startAutoPipeline()">🚀 开始处理</button>
                    </div>
                    <div class="auto-progress" id="auto-progress" style="display:none">
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="auto-bar" style="width:0%">0%</div>
                        </div>
                        <div class="steps-indicator" id="auto-steps"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 模态框: 模型配置 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">模型配置</h3>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
